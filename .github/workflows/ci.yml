name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - run: clojure -M:test

      - run: clojure -M:lint
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --global nbb@1.4.208
      - run: nbb test/run_nbb_contract_tests.cljs
